name: dispute handler

# Když někdo otevře issue s labelem `dispute` (z webu nebo manuálně), přidá
# triáž label, automatickou odpověď s linky na methodology a postup. Issues
# se pak řeší ručně — workflow pouze připraví kontext pro rychlou odpověď.
#
# Per methodology/governance.md vrstva 6: public dispute mechanismus.

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  issues: write

jobs:
  triage:
    if: ${{ github.event.label.name == 'dispute' || contains(github.event.issue.labels.*.name, 'dispute') }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ensure dispute and triage labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create dispute \
            --color D93F0B \
            --description "Public dispute against an event classification." \
            --repo "${{ github.repository }}" \
            --force
          gh label create triage \
            --color FEF2C0 \
            --description "Awaiting human triage." \
            --repo "${{ github.repository }}" \
            --force

      - name: Add triage label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
        run: gh issue edit "$ISSUE" --add-label triage --repo "${{ github.repository }}"

      - name: Auto-comment with methodology links
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          # Build body via printf in a single block so we don't run into the
          # YAML literal-block indentation rule (lines at column 0 inside
          # a `run: |` scalar terminate the scalar early).
          mkdir -p tmp
          {
            printf 'Díky za dispute! 🙏\n\n'
            printf 'Tento issue automaticky dostal label `triage`. Než se k němu dostanu ručně, krátký kontext:\n\n'
            printf '**Než budeš pokračovat — podívej se prosím sem:**\n'
            printf -- '- [`methodology/pillars.md`](../blob/main/methodology/pillars.md) — co každý pilíř měří, kdy patří/nepatří k pillaru\n'
            printf -- '- [`methodology/severity_rubric.md`](../blob/main/methodology/severity_rubric.md) — kalibrace severity 1–5 s ČR příklady\n'
            printf -- '- [`methodology/governance.md`](../blob/main/methodology/governance.md) — proč nepřepisujeme severity ručně po publikaci, ale řešíme to skrz dispute log\n\n'
            printf '**Co dispute typicky vede k:**\n'
            printf -- '- Pokud najdu jasnou chybu klasifikace → ruční edit `data/events/<week>.json` s commitem; recompute-scores workflow přepočítá timeline\n'
            printf -- '- Pokud jde o sporný judgment call → necháme původní klasifikaci, ale zaznamenám rozpor pro budoucí prompt-tuning\n'
            printf -- '- Pokud disagreement odhalí systematický problém → otevřu issue na úpravu rubric/promptu\n\n'
            printf 'Odpověď typicky do týdne.\n'
          } > tmp/dispute-comment.md
          gh issue comment "$ISSUE" --body-file tmp/dispute-comment.md --repo "${{ github.repository }}"
