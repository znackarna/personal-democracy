name: pipeline

on:
  # Denně 06:00 UTC = 07:00/08:00 v ČR (zima/léto). Daily fetch + classify
  # zachytí rychle se točící RSS feedy (iROZHLAS retence ~1 den, HN ~3 dny).
  # V pondělí navíc proběhne agregace uplynulého kompletního týdne.
  schedule:
    - cron: '0 6 * * *'
  # Manuální trigger z UI Actions tabu — užitečné pro test po deployi nebo
  # ad-hoc běh mimo cron cyklus.
  workflow_dispatch:
    inputs:
      mode:
        description: 'daily | aggregate | both (default: auto-detect by day-of-week)'
        required: false
        default: ''
      week:
        description: 'ISO week (default: current for daily, previous for aggregate)'
        required: false
      baseline:
        description: 'Structural baseline quarter'
        required: false
        default: '2026-Q2'
      sources:
        description: 'Comma-separated source ids (default: all 19 active)'
        required: false
        default: 'denik-n,irozhlas,ct24,hn,aktualne,investigace-cz,a2larm,seznam-zpravy,ti-cz,ustavni-soud,psp-cz,politico-eu,bbc-europe,euronews,visegrad-insight,brno-daily,hlidac-statu,hlidac-smlouvy,hlidac-dotace'

permissions:
  contents: write
  issues: write

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      HLIDAC_API_KEY: ${{ secrets.HLIDAC_API_KEY }}
    steps:
      - name: Verify required secrets are set
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HLIDAC_API_KEY: ${{ secrets.HLIDAC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY repository secret is not set."
            exit 1
          fi
          echo "✓ ANTHROPIC_API_KEY is configured (${#ANTHROPIC_API_KEY} chars)"
          if [ -z "$HLIDAC_API_KEY" ]; then
            echo "::warning::HLIDAC_API_KEY not set — Hlídač sources will fail if listed in --sources."
          else
            echo "✓ HLIDAC_API_KEY is configured (${#HLIDAC_API_KEY} chars)"
          fi

      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Compute weeks + mode
        id: vars
        run: |
          # Daily: zpracuje aktuální ISO týden (kam routujeme nově klasifikované events).
          # Aggregate: zpracuje uplynulý kompletní ISO týden (Po-Ne ending včera).
          # Mode auto-detection: pondělí = both (daily fetches new + aggregate previous);
          # ostatní dny = daily only.
          CURRENT_YEAR=$(date -u +%G)
          CURRENT_WEEK=$(date -u +%V)
          PREV_YEAR=$(date -u -d 'last monday' +%G)
          PREV_WEEK=$(date -u -d 'last monday' +%V)
          DOW=$(date -u +%u)  # 1=Mon..7=Sun

          MODE="${{ inputs.mode }}"
          if [ -z "$MODE" ]; then
            if [ "$DOW" = "1" ]; then
              MODE="both"
            else
              MODE="daily"
            fi
          fi

          DAILY_WEEK="${{ inputs.week }}"
          if [ -z "$DAILY_WEEK" ]; then DAILY_WEEK="${CURRENT_YEAR}-W${CURRENT_WEEK}"; fi

          AGGREGATE_WEEK="${{ inputs.week }}"
          if [ -z "$AGGREGATE_WEEK" ]; then AGGREGATE_WEEK="${PREV_YEAR}-W${PREV_WEEK}"; fi

          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"
          echo "daily_week=${DAILY_WEEK}" >> "$GITHUB_OUTPUT"
          echo "aggregate_week=${AGGREGATE_WEEK}" >> "$GITHUB_OUTPUT"
          echo "▶ mode=${MODE} daily_week=${DAILY_WEEK} aggregate_week=${AGGREGATE_WEEK}"

      - name: Run daily pipeline (fetch + classify + merge)
        if: ${{ steps.vars.outputs.mode == 'daily' || steps.vars.outputs.mode == 'both' }}
        env:
          WEEK: ${{ steps.vars.outputs.daily_week }}
          SOURCES: ${{ inputs.sources || 'denik-n,irozhlas,ct24,hn,aktualne,investigace-cz,a2larm,seznam-zpravy,ti-cz,ustavni-soud,psp-cz,politico-eu,bbc-europe,euronews,visegrad-insight,brno-daily,hlidac-statu,hlidac-smlouvy,hlidac-dotace' }}
        run: |
          npm run pipeline:daily -- --week="$WEEK" --sources="$SOURCES"

      - name: Run weekly aggregation (audit + score + anomalies + report)
        if: ${{ steps.vars.outputs.mode == 'aggregate' || steps.vars.outputs.mode == 'both' }}
        env:
          WEEK: ${{ steps.vars.outputs.aggregate_week }}
          BASELINE: ${{ inputs.baseline || '2026-Q2' }}
        run: |
          mkdir -p tmp
          # 19 = výchozí počet aktivních zdrojů; per-source threshold v
          # detect-anomalies škáluje podle něj. Pokud chceš dynamický počet,
          # workflow by musel sledovat per-day fetch result — pro v1 stačí
          # pevná hodnota odpovídající live source listu.
          npm run pipeline:aggregate -- \
            --week="$WEEK" \
            --baseline="$BASELINE" \
            --active-source-count=19 \
            --emit-anomalies-json=tmp/anomalies.json

      - name: Ensure anomaly label exists
        if: ${{ (steps.vars.outputs.mode == 'aggregate' || steps.vars.outputs.mode == 'both') && hashFiles('tmp/anomalies.json') != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create anomaly \
            --color FBCA04 \
            --description "Auto-opened by pipeline; oversight ping, non-blocking." \
            --force

      - name: Open anomaly issues
        if: ${{ (steps.vars.outputs.mode == 'aggregate' || steps.vars.outputs.mode == 'both') && hashFiles('tmp/anomalies.json') != '' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WEEK: ${{ steps.vars.outputs.aggregate_week }}
        run: |
          if [ ! -s tmp/anomalies.json ]; then echo "No anomalies file populated."; exit 0; fi
          COUNT=$(jq 'length' tmp/anomalies.json)
          if [ "$COUNT" = "0" ]; then echo "No anomalies for $WEEK."; exit 0; fi
          DATE=$(date -u +%Y-%m-%d)
          echo "Opening $COUNT anomaly issue(s) for $WEEK..."
          jq -c '.[]' tmp/anomalies.json | while IFS= read -r anomaly; do
            TRIGGER=$(echo "$anomaly" | jq -r '.trigger')
            LEVEL=$(echo "$anomaly" | jq -r '.level')
            DETAILS=$(echo "$anomaly" | jq -r '.details')
            TITLE="Anomaly ($LEVEL) $WEEK: $TRIGGER"
            {
              printf '**Week:** `%s`\n\n' "$WEEK"
              printf '**Trigger:** `%s` (level: %s)\n\n' "$TRIGGER" "$LEVEL"
              printf '**Details:** %s\n\n' "$DETAILS"
              printf -- '---\n\n'
              printf 'Per [methodology/governance.md](../blob/main/methodology/governance.md) vrstva 4: anomálie nezablokuje publikaci. Index byl commitnut normálně. Tento issue je oversight ping — projdi daily report, případně edituj `data/events/%s.json` (recompute-scores workflow přepočítá timeline) a issue zavři.\n\n' "$WEEK"
              printf 'Daily report: [`data/reports/%s.md`](../blob/main/data/reports/%s.md)\n' "$DATE" "$DATE"
              printf 'Events: [`data/events/%s.json`](../blob/main/data/events/%s.json)\n' "$WEEK" "$WEEK"
            } > tmp/issue-body.md
            gh issue create --title "$TITLE" --body-file tmp/issue-body.md --label anomaly
          done

      - name: Commit results
        run: |
          git config user.name 'democracy-pipeline-bot'
          git config user.email '[email protected]'
          git add data/events data/scores data/reports
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          MODE="${{ steps.vars.outputs.mode }}"
          DAILY_WEEK="${{ steps.vars.outputs.daily_week }}"
          AGG_WEEK="${{ steps.vars.outputs.aggregate_week }}"
          if [ "$MODE" = "both" ]; then
            MSG="data: daily ${DAILY_WEEK} + aggregate ${AGG_WEEK} [skip ci]"
          elif [ "$MODE" = "aggregate" ]; then
            MSG="data: aggregate ${AGG_WEEK} [skip ci]"
          else
            MSG="data: daily ${DAILY_WEEK} [skip ci]"
          fi
          git commit -m "$MSG"
          git push origin main
